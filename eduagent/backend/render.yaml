services:
  - type: web
    name: eduagent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eduagent-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
      # 以下三个请在 Render Dashboard 里手动填写你的讯飞 API Key
      - key: SPARK_API_KEY
        sync: false
      - key: SPARK_API_SECRET
        sync: false
      - key: SPARK_APP_ID
        sync: false

databases:
  - name: eduagent-db
    plan: free
    databaseName: eduagent
